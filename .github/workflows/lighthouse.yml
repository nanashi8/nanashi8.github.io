name: Lighthouse CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci
          retention-days: 30

      - name: Comment PR with Lighthouse results
        uses: actions/github-script@v8
        if: always()
        with:
          script: |
            const fs = require('fs');

            let comment = '## 🔦 Lighthouse CI Results\n\n';
            comment += '各カテゴリのスコア（目標90%以上）:\n\n';
            comment += '- ⚡ **Performance**: パフォーマンス\n';
            comment += '- ♿ **Accessibility**: アクセシビリティ\n';
            comment += '- ✅ **Best Practices**: ベストプラクティス\n';
            comment += '- 🔍 **SEO**: SEO対策\n\n';
            comment += '詳細レポートはアーティファクトからダウンロードできます。\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
