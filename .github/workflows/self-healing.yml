name: Project Self-Healing

on:
  # 毎日午前2時（JST 11:00）に自動実行
  schedule:
    - cron: '0 2 * * *'
  
  # 手動実行も可能
  workflow_dispatch:
    inputs:
      auto_commit:
        description: '修正を自動コミットする'
        required: false
        default: 'true'
        type: boolean

jobs:
  self-heal:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # 自動コミット用
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # 全履歴を取得
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: 構造検証
      id: validate
      run: |
        echo "🔍 プロジェクト構造を検証中..."
        python3 scripts/validate_project_structure.py || echo "validation_failed=true" >> $GITHUB_OUTPUT
    
    - name: 自動修復
      id: fix
      run: |
        echo "🔧 問題を自動修復中..."
        python3 scripts/auto_fix_project_structure.py
    
    - name: 修復後の検証
      run: |
        echo "✅ 修復結果を検証中..."
        python3 scripts/validate_project_structure.py
    
    - name: Instructions インデックス更新
      run: |
        echo "📚 Instructions インデックスを更新中..."
        python3 -c "from scripts.auto_fix_project_structure import update_instructions_index; update_instructions_index()"
    
    - name: 変更を自動コミット
      if: ${{ github.event.inputs.auto_commit != 'false' }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        if [ -n "$(git status --porcelain)" ]; then
          echo "🤖 変更を自動コミット中..."
          git add .
          git commit -m "🤖 自動修復: プロジェクト構造の最適化

          - v2ファイルの統合
          - 重複ファイルの削除
          - 古い参照の更新
          - アーカイブの整理
          - Instructions インデックス更新
          
          Generated by: Project Self-Healing Workflow"
          git push
          echo "✅ 自動コミット完了"
        else
          echo "✨ 修復不要（構造は正常）"
        fi
    
    - name: 通知（エラー時）
      if: failure()
      run: |
        echo "❌ 自己修復に失敗しました"
        echo "詳細はワークフローログを確認してください"
